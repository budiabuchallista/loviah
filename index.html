function formatRupiah(n) {
  const num = Number(n) || 0;
  return new Intl.NumberFormat("id-ID", {
    style: "currency",
    currency: "IDR",
    minimumFractionDigits: 0,
    maximumFractionDigits: 0,
  }).format(num);
}

// Format angka jadi string dengan titik pemisah ribuan (mis. "1500000" -> "1.500.000")
function formatRibuan(value) {
  const digits = String(value == null ? "" : value).replace(/\D/g, "");
  if (!digits) return "";
  return Number(digits).toLocaleString("id-ID");
}

// Ambil digit murni dari input yang sudah berformat titik ribuan
function parseRibuan(value) {
  return String(value == null ? "" : value).replace(/\D/g, "");
}

// Input nominal dengan titik pemisah ribuan otomatis saat mengetik.
// value/onChange bekerja dengan string digit murni (mis. "1500000"),
// tampilan di layar otomatis terformat "1.500.000".
function CurrencyInput({ value, onChange, placeholder, style }) {
  return (
    <input
      type="text"
      inputMode="numeric"
      placeholder={placeholder || "0"}
      value={formatRibuan(value)}
      onChange={(e) => onChange(parseRibuan(e.target.value))}
      style={style || inputStyle}
    />
  );
}

function formatTanggal(iso) {
  if (!iso) return "-";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("id-ID", { day: "numeric", month: "short", year: "numeric" });
}

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function monthKey(iso) {
  return (iso || todayISO()).slice(0, 7);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function currentMonthLabel() {
  return new Date().toLocaleDateString("id-ID", { month: "long", year: "numeric" });
}

/* ---------------------------------------------------------
   App
---------------------------------------------------------- */

function App() {
  const [data, setData] = useState(emptyData());
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("ringkasan");
  const [connected, setConnected] = useState(false);
  const [errorMsg, setErrorMsg] = useState("");
  const docRef = useRef(null);
  const unsubRef = useRef(null);

  const saveData = useCallback((next) => {
    setData(next);
    if (!docRef.current) {
      setErrorMsg("Belum tersambung ke database. Tunggu sebentar lalu coba lagi.");
      return;
    }
    docRef.current.set(next).catch(() => {
      setErrorMsg("Gagal menyimpan. Periksa koneksi internet lalu coba lagi.");
    });
  }, []);

  useEffect(() => {
    let cancelled = false;

    async function init() {
      try {
        if (cancelled) return;
        if (!window.firebase) throw new Error("SDK Firebase belum termuat");

        const fb = window.firebase;
        if (!fb.apps.length) fb.initializeApp(FIREBASE_CONFIG);

        await fb.auth().signInAnonymously();

        fb.auth().onAuthStateChanged((user) => {
          if (!user || cancelled) return;

          const ref = fb.firestore().collection("kasKeluarga").doc("data");
          docRef.current = ref;

          unsubRef.current = ref.onSnapshot(
            (snap) => {
              if (snap.exists) {
                setData({ ...emptyData(), ...snap.data() });
              } else {
                ref.set(emptyData());
                setData(emptyData());
              }
              setConnected(true);
              setErrorMsg("");
              setLoading(false);
            },
            (err) => {
              setConnected(false);
              setErrorMsg("Gagal menyinkronkan data: " + err.message);
              setLoading(false);
            }
          );
        });
      } catch (e) {
        setConnected(false);
        setErrorMsg("Gagal terhubung ke database. Periksa koneksi internet Anda.");
        setLoading(false);
      }
    }

    init();
    return () => {
      cancelled = true;
      if (unsubRef.current) unsubRef.current();
    };
  }, []);

  const bulanIni = monthKey(todayISO());
  const transaksiBulanIni = data.transaksi.filter((t) => monthKey(t.tanggal) === bulanIni);
  const totalMasuk = transaksiBulanIni.filter((t) => t.tipe === "masuk").reduce((s, t) => s + Number(t.jumlah), 0);
  const totalKeluar = transaksiBulanIni.filter((t) => t.tipe === "keluar").reduce((s, t) => s + Number(t.jumlah), 0);
  const selisih = totalMasuk - totalKeluar;

  if (loading) {
    return (
      <div style={{ ...styles.app, alignItems: "center", justifyContent: "center" }}>
        <FontLoader />
        <div style={{ color: COLORS.inkLight, fontFamily: FONT.body }}>Memuat data…</div>
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <FontLoader />
      <Header connected={connected} />
      {errorMsg && (
        <div style={styles.errorBanner}>
          <AppIcon name="alert" size={15} style={{ flexShrink: 0 }} />
          <span>{errorMsg}</span>
        </div>
      )}

      <div style={styles.content}>
        {tab === "ringkasan" && (
          <Ringkasan
            totalMasuk={totalMasuk}
            totalKeluar={totalKeluar}
            selisih={selisih}
            transaksiBulanIni={transaksiBulanIni}
            tagihan={data.tagihan}
          />
        )}
        {tab === "transaksi" && <TransaksiView data={data} saveData={saveData} />}
        {tab === "tagihan" && <TagihanView data={data} saveData={saveData} />}
        {tab === "hutang" && <HutangPiutangView data={data} saveData={saveData} />}
      </div>

      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

function Ringkasan({ totalMasuk, totalKeluar, selisih, transaksiBulanIni, tagihan }) {
  const defisit = selisih < 0;
  const pct = totalMasuk > 0 ? Math.min(100, Math.round((totalKeluar / totalMasuk) * 100)) : totalKeluar > 0 ? 100 : 0;
  const belumBayar = tagihan.filter((t) => t.status !== "lunas");
  const recent = [...transaksiBulanIni].sort((a, b) => (a.tanggal < b.tanggal ? 1 : -1)).slice(0, 5);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <Card style={{ background: COLORS.ink, color: COLORS.paper, border: "none" }}>
        <div style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: "rgba(246,241,228,0.6)", fontWeight: 600 }}>
          Saldo Bulan Ini
        </div>
        <div
          style={{
            fontFamily: FONT.mono,
            fontSize: 30,
            fontWeight: 600,
            marginTop: 4,
            color: defisit ? "#E8A78F" : "#A9D8BB",
          }}
        >
          {formatRupiah(selisih)}
        </div>
        {defisit && (
          <div style={{ fontSize: 12.5, color: "#E8A78F", marginTop: 4, fontWeight: 500 }}>
            Pengeluaran lebih besar {formatRupiah(Math.abs(selisih))} dari pemasukan bulan ini.
          </div>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11.5, color: "rgba(246,241,228,0.6)" }}>
              <AppIcon name="trending-up" size={12} /> Pemasukan
            </div>
            <div style={{ fontFamily: FONT.mono, fontSize: 15.5, fontWeight: 600, marginTop: 2 }}>{formatRupiah(totalMasuk)}</div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11.5, color: "rgba(246,241,228,0.6)" }}>
              <AppIcon name="trending-down" size={12} /> Pengeluaran
            </div>
            <div style={{ fontFamily: FONT.mono, fontSize: 15.5, fontWeight: 600, marginTop: 2 }}>{formatRupiah(totalKeluar)}</div>
          </div>
        </div>

        <div style={{ marginTop: 12, height: 6, borderRadius: 4, background: "rgba(246,241,228,0.15)", overflow: "hidden" }}>
          <div
            style={{
              width: `${pct}%`,
              height: "100%",
              background: pct >= 100 ? "#D9694F" : COLORS.gold,
              borderRadius: 4,
            }}
          />
        </div>
        <div style={{ fontSize: 11, color: "rgba(246,241,228,0.55)", marginTop: 5 }}>
          {pct}% dari pemasukan sudah terpakai
        </div>
      </Card>

      {belumBayar.length > 0 && (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontWeight: 700, fontSize: 14.5 }}>Tagihan Belum Dibayar</div>
            <div style={{ fontSize: 12, color: COLORS.inkLight, fontFamily: FONT.mono }}>{belumBayar.length}</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {belumBayar.slice(0, 4).map((t) => (
              <div key={t.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5 }}>
                <span>{t.nama}</span>
                <span style={{ fontFamily: FONT.mono, color: COLORS.red, fontWeight: 600 }}>{formatRupiah(t.jumlah)}</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      <Card>
        <div style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 10 }}>Transaksi Terbaru</div>
        {recent.length === 0 ? (
          <EmptyState text="Belum ada transaksi bulan ini." />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {recent.map((t) => (
              <TransaksiRow key={t.id} t={t} />
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>

            borderRadius: 9,
            flexShrink: 0,

            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            color: masuk ? COLORS.green : COLORS.red,

          {masuk ? <AppIcon name="trending-up" size={15} /> : <AppIcon name="trending-down" size={15} />}

        <div style={{ minWidth: 0 }}>

            {t.kategori}
            {t.catatan && <span style={{ fontWeight: 500, color: COLORS.inkLight }}> : {t.catatan}</span>}
          </div>
          <div style={{ fontSize: 11.5, color: COLORS.inkLight }}>{formatTanggal(t.tanggal)}</div>
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
        <div style={{ fontFamily: FONT.mono, fontWeight: 700, fontSize: 13.5, color: masuk ? COLORS.green : COLORS.red }}>
          {masuk ? "+" : "-"}
          {formatRupiah(t.jumlah)}
        </div>
        {onDelete && (
          <button onClick={() => onDelete(t.id)} style={iconBtnStyle}>
            <AppIcon name="trash" size={14} color={COLORS.inkLight} />
          </button>
        )}
      </div>
    </div>
  );
}

const iconBtnStyle = {
  background: "none",
  border: "none",
  padding: 4,
  cursor: "pointer",
  display: "flex",
  alignItems: "center",
};

/* ---------------------------------------------------------
   Transaksi View
---------------------------------------------------------- */

function TransaksiView({ data, saveData }) {
  const [showForm, setShowForm] = useState(false);
  const [filterBulan, setFilterBulan] = useState(monthKey(todayISO()));

  const list = data.transaksi
    .filter((t) => monthKey(t.tanggal) === filterBulan)
    .sort((a, b) => (a.tanggal < b.tanggal ? 1 : -1));

  const addTransaksi = (item) => {
    const next = { ...data, transaksi: [...data.transaksi, { ...item, id: uid() }] };
    saveData(next);
    setShowForm(false);
  };

  const deleteTransaksi = (id) => {
    saveData({ ...data, transaksi: data.transaksi.filter((t) => t.id !== id) });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", gap: 8 }}>
        <input
          type="month"
          value={filterBulan}
          onChange={(e) => setFilterBulan(e.target.value)}
          style={{ ...inputStyle, flex: 1 }}
        />
        <button onClick={() => setShowForm(true)} style={primaryBtnStyle}>
          <AppIcon name="plus" size={16} /> Catat
        </button>
      </div>

      <Card>
        {list.length === 0 ? (
          <EmptyState text="Tidak ada transaksi di bulan ini." />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {list.map((t) => (
              <TransaksiRow key={t.id} t={t} onDelete={deleteTransaksi} />
            ))}
          </div>
        )}
      </Card>

      {showForm && <TransaksiForm onClose={() => setShowForm(false)} onSubmit={addTransaksi} />}
    </div>
  );
}

function TransaksiForm({ onClose, onSubmit }) {
  const [tipe, setTipe] = useState("keluar");
  const [kategori, setKategori] = useState("");
  const [jumlah, setJumlah] = useState("");
  const [tanggal, setTanggal] = useState(todayISO());
  const [catatan, setCatatan] = useState("");
  const opsiKategori = tipe === "masuk" ? KATEGORI_MASUK : KATEGORI_KELUAR;

  const submit = () => {
    if (!kategori || !jumlah || Number(jumlah) <= 0) return;
    onSubmit({ tipe, kategori, jumlah: Number(jumlah), tanggal, catatan });
  };

  return (
    <Modal onClose={onClose} title="Catat Transaksi">
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        {["keluar", "masuk"].map((v) => (
          <button
            key={v}
            onClick={() => {
              setTipe(v);
              setKategori("");
            }}
            style={{
              flex: 1,
              padding: "9px 0",
              borderRadius: 9,
              border: `1.5px solid ${tipe === v ? (v === "masuk" ? COLORS.green : COLORS.red) : COLORS.border}`,
              background: tipe === v ? (v === "masuk" ? COLORS.greenSoft : COLORS.redSoft) : "transparent",
              color: tipe === v ? (v === "masuk" ? COLORS.green : COLORS.red) : COLORS.inkLight,
              fontWeight: 700,
              fontSize: 13,
              cursor: "pointer",
            }}
          >
            {v === "masuk" ? "Pemasukan" : "Pengeluaran"}
          </button>
        ))}
      </div>

      <FieldLabel>Kategori</FieldLabel>
      <select value={kategori} onChange={(e) => setKategori(e.target.value)} style={inputStyle}>
        <option value="">Pilih kategori</option>
        {opsiKategori.map((k) => (
          <option key={k} value={k}>
            {k}
          </option>
        ))}
      </select>

      <FieldLabel>Jumlah (Rp)</FieldLabel>
      <CurrencyInput value={jumlah} onChange={setJumlah} />

      <FieldLabel>Tanggal</FieldLabel>
      <input type="date" value={tanggal} onChange={(e) => setTanggal(e.target.value)} style={inputStyle} />

      <FieldLabel>Catatan (opsional)</FieldLabel>
      <input
        type="text"
        placeholder="mis. bayar SPP bulan Juli"
        value={catatan}
        onChange={(e) => setCatatan(e.target.value)}
        style={inputStyle}
      />

      <button onClick={submit} style={{ ...primaryBtnStyle, width: "100%", justifyContent: "center", marginTop: 8 }}>
        Simpan Transaksi
      </button>
    </Modal>
  );
}

/* ---------------------------------------------------------
   Tagihan (Checklist) View
---------------------------------------------------------- */

function TagihanView({ data, saveData }) {
  const [showForm, setShowForm] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);

  const belum = data.tagihan.filter((t) => t.status !== "lunas");
  const lunas = data.tagihan.filter((t) => t.status === "lunas");
  const totalBelum = belum.reduce((s, t) => s + Number(t.jumlah), 0);

  const addTagihan = (item) => {
    saveData({ ...data, tagihan: [...data.tagihan, { ...item, id: uid(), status: "belum" }] });
    setShowForm(false);
  };

  const toggleLunas = (item) => {
    const jadiLunas = item.status !== "lunas";
    let transaksi = [...data.transaksi];

    if (jadiLunas) {
      // catat otomatis sebagai pengeluaran
      const txId = uid();
      transaksi.push({
        id: txId,
        tipe: "keluar",
        kategori: item.kategori || "Lainnya",
        jumlah: item.jumlah,
        tanggal: todayISO(),
        catatan: `Tagihan: ${item.nama}`,
      });
      const tagihan = data.tagihan.map((t) =>
        t.id === item.id ? { ...t, status: "lunas", tanggalBayar: todayISO(), transaksiId: txId } : t
      );
      saveData({ ...data, tagihan, transaksi });
    } else {
      // batalkan status lunas, hapus transaksi otomatis terkait jika masih ada
      transaksi = transaksi.filter((t) => t.id !== item.transaksiId);
      const tagihan = data.tagihan.map((t) =>
        t.id === item.id ? { ...t, status: "belum", tanggalBayar: null, transaksiId: null } : t
      );
      saveData({ ...data, tagihan, transaksi });
    }
  };

  const deleteTagihan = (id) => {
    const item = data.tagihan.find((t) => t.id === id);
    const transaksi = item && item.transaksiId ? data.transaksi.filter((t) => t.id !== item.transaksiId) : data.transaksi;
    saveData({ ...data, tagihan: data.tagihan.filter((t) => t.id !== id), transaksi });
  };

  const resetSemua = () => {
    saveData({ ...data, tagihan: data.tagihan.map((t) => ({ ...t, status: "belum", tanggalBayar: null, transaksiId: null })) });
    setConfirmReset(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <Card style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 11, color: COLORS.inkLight, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>
            Belum dibayar
          </div>
          <div style={{ fontFamily: FONT.mono, fontSize: 19, fontWeight: 700, color: COLORS.red }}>{formatRupiah(totalBelum)}</div>
        </div>
        <button onClick={() => setShowForm(true)} style={primaryBtnStyle}>
          <AppIcon name="plus" size={16} /> Tagihan
        </button>
      </Card>

      <div>
        <SectionTitle>Perlu Dibayar ({belum.length})</SectionTitle>
        {belum.length === 0 ? (
          <Card>
            <EmptyState text="Semua tagihan bulan ini sudah lunas 🎉" />
          </Card>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {belum.map((t) => (
              <TagihanRow key={t.id} item={t} onToggle={toggleLunas} onDelete={deleteTagihan} />
            ))}
          </div>
        )}
      </div>

      {lunas.length > 0 && (
        <div>
          <SectionTitle>Sudah Dibayar ({lunas.length})</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {lunas.map((t) => (
              <TagihanRow key={t.id} item={t} onToggle={toggleLunas} onDelete={deleteTagihan} />
            ))}
          </div>
        </div>
      )}

      {data.tagihan.length > 0 && (
        <button onClick={() => setConfirmReset(true)} style={{ ...ghostBtnStyle, marginTop: 4 }}>
          Mulai Bulan Baru (reset semua centang)
        </button>
      )}

      {showForm && <TagihanForm onClose={() => setShowForm(false)} onSubmit={addTagihan} />}

      {confirmReset && (
        <Modal onClose={() => setConfirmReset(false)} title="Mulai Bulan Baru?">
          <p style={{ fontSize: 13.5, color: COLORS.inkLight, lineHeight: 1.5 }}>
            Semua tagihan akan ditandai belum dibayar lagi untuk bulan berikutnya. Daftar tagihan tidak akan dihapus.
          </p>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button onClick={() => setConfirmReset(false)} style={{ ...ghostBtnStyle, flex: 1 }}>
              Batal
            </button>
            <button onClick={resetSemua} style={{ ...primaryBtnStyle, flex: 1, justifyContent: "center" }}>
              Ya, Reset
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize: 11.5, fontWeight: 700, color: COLORS.inkLight, textTransform: "uppercase", letterSpacing: 0.6, margin: "4px 2px 8px" }}>
      {children}
    </div>
  );
}

function TagihanRow({ item, onToggle, onDelete }) {
  const lunas = item.status === "lunas";
  return (
    <Card style={{ display: "flex", alignItems: "center", gap: 10, padding: 12, opacity: lunas ? 0.7 : 1 }}>
      <button
        onClick={() => onToggle(item)}
        aria-label={lunas ? "Tandai belum dibayar" : "Tandai sudah dibayar"}
        style={{
          width: 24,
          height: 24,
          borderRadius: 7,
          border: `2px solid ${lunas ? COLORS.green : COLORS.border}`,
          background: lunas ? COLORS.green : "transparent",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          flexShrink: 0,
          cursor: "pointer",
        }}
      >
        {lunas && <AppIcon name="check-square" size={14} color="#fff" fill={COLORS.green} />}
      </button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, textDecoration: lunas ? "line-through" : "none" }}>{item.nama}</div>
        <div style={{ fontSize: 11.5, color: COLORS.inkLight }}>
          {item.kategori || "Lainnya"}
          {item.tanggalJatuhTempo ? ` · jatuh tempo tgl ${item.tanggalJatuhTempo}` : ""}
        </div>
      </div>
      <div style={{ fontFamily: FONT.mono, fontWeight: 700, fontSize: 13.5, color: lunas ? COLORS.inkLight : COLORS.red }}>
        {formatRupiah(item.jumlah)}
      </div>
      <button onClick={() => onDelete(item.id)} style={iconBtnStyle}>
        <AppIcon name="trash" size={14} color={COLORS.inkLight} />
      </button>
    </Card>
  );
}

function TagihanForm({ onClose, onSubmit }) {
  const [nama, setNama] = useState("");
  const [kategori, setKategori] = useState("");
  const [jumlah, setJumlah] = useState("");
  const [tanggalJatuhTempo, setTanggalJatuhTempo] = useState("");

  const submit = () => {
    if (!nama || !jumlah || Number(jumlah) <= 0) return;
    onSubmit({ nama, kategori, jumlah: Number(jumlah), tanggalJatuhTempo });
  };

  return (
    <Modal onClose={onClose} title="Tambah Tagihan">
      <FieldLabel>Nama Tagihan</FieldLabel>
      <input
        type="text"
        placeholder="mis. SPP Sekolah, Listrik PLN"
        value={nama}
        onChange={(e) => setNama(e.target.value)}
        style={inputStyle}
      />

      <FieldLabel>Kategori</FieldLabel>
      <select value={kategori} onChange={(e) => setKategori(e.target.value)} style={inputStyle}>
        <option value="">Pilih kategori</option>
        {KATEGORI_KELUAR.map((k) => (
          <option key={k} value={k}>
            {k}
          </option>
        ))}
      </select>

      <FieldLabel>Jumlah (Rp)</FieldLabel>
      <CurrencyInput value={jumlah} onChange={setJumlah} />

      <FieldLabel>Tanggal Jatuh Tempo (opsional, tgl berapa tiap bulan)</FieldLabel>
      <input
        type="number"
        min="1"
        max="31"
        placeholder="mis. 10"
        value={tanggalJatuhTempo}
        onChange={(e) => setTanggalJatuhTempo(e.target.value)}
        style={inputStyle}
      />

      <button onClick={submit} style={{ ...primaryBtnStyle, width: "100%", justifyContent: "center", marginTop: 8 }}>
        Simpan Tagihan
      </button>
    </Modal>
  );
}

/* ---------------------------------------------------------
   Hutang Piutang View
---------------------------------------------------------- */

function HutangPiutangView({ data, saveData }) {
  const [showForm, setShowForm] = useState(false);
  const [tabHP, setTabHP] = useState("piutang");

  const list = data.hutangPiutang.filter((h) => h.tipe === tabHP);
  const sisaTotal = list.reduce((s, h) => {
    const dibayar = (h.pembayaran || []).reduce((a, p) => a + Number(p.jumlah), 0);
    return s + Math.max(0, Number(h.jumlah) - dibayar);
  }, 0);

  const addItem = (item) => {
    saveData({ ...data, hutangPiutang: [...data.hutangPiutang, { ...item, id: uid(), pembayaran: [] }] });
    setShowForm(false);
  };

  const deleteItem = (id) => {
    saveData({ ...data, hutangPiutang: data.hutangPiutang.filter((h) => h.id !== id) });
  };

  const addPembayaran = (id, jumlah) => {
    const hutangPiutang = data.hutangPiutang.map((h) =>
      h.id === id ? { ...h, pembayaran: [...(h.pembayaran || []), { id: uid(), jumlah, tanggal: todayISO() }] } : h
    );
    saveData({ ...data, hutangPiutang });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", gap: 8 }}>
        {[
          { id: "piutang", label: "Piutang (dipinjamkan)" },
          { id: "hutang", label: "Hutang (dipinjam)" },
        ].map((o) => (
          <button
            key={o.id}
            onClick={() => setTabHP(o.id)}
            style={{
              flex: 1,
              padding: "9px 6px",
              borderRadius: 9,
              border: `1.5px solid ${tabHP === o.id ? COLORS.gold : COLORS.border}`,
              background: tabHP === o.id ? COLORS.goldSoft : "transparent",
              color: tabHP === o.id ? "#7A5A22" : COLORS.inkLight,
              fontWeight: 700,
              fontSize: 12,
              cursor: "pointer",
            }}
          >
            {o.label}
          </button>
        ))}
      </div>

      <Card style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 11, color: COLORS.inkLight, fontWeight: 600, textTransform: "uppercase" }}>
            Sisa {tabHP === "piutang" ? "Piutang" : "Hutang"}
          </div>
          <div style={{ fontFamily: FONT.mono, fontSize: 19, fontWeight: 700 }}>{formatRupiah(sisaTotal)}</div>
        </div>
        <button onClick={() => setShowForm(true)} style={primaryBtnStyle}>
          <AppIcon name="plus" size={16} /> Catat
        </button>
      </Card>

      {list.length === 0 ? (
        <Card>
          <EmptyState text={`Belum ada catatan ${tabHP === "piutang" ? "piutang" : "hutang"}.`} />
        </Card>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {list.map((h) => (
            <HutangCard key={h.id} item={h} onDelete={deleteItem} onBayar={addPembayaran} />
          ))}
        </div>
      )}

      {showForm && <HutangForm tipe={tabHP} onClose={() => setShowForm(false)} onSubmit={addItem} />}
    </div>
  );
}

function HutangCard({ item, onDelete, onBayar }) {
  const [showBayar, setShowBayar] = useState(false);
  const [nominal, setNominal] = useState("");
  const dibayar = (item.pembayaran || []).reduce((a, p) => a + Number(p.jumlah), 0);
  const sisa = Math.max(0, Number(item.jumlah) - dibayar);
  const lunas = sisa <= 0;
  const pct = item.jumlah > 0 ? Math.min(100, Math.round((dibayar / item.jumlah) * 100)) : 0;

  return (
    <Card>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>{item.nama}</div>
          {item.catatan && <div style={{ fontSize: 12, color: COLORS.inkLight, marginTop: 1 }}>{item.catatan}</div>}
          <div style={{ fontSize: 11.5, color: COLORS.inkLight, marginTop: 2 }}>Dicatat {formatTanggal(item.tanggal)}</div>
        </div>
        <button onClick={() => onDelete(item.id)} style={iconBtnStyle}>
          <AppIcon name="trash" size={14} color={COLORS.inkLight} />
        </button>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 10 }}>
        <span style={{ fontSize: 11.5, color: COLORS.inkLight }}>Total {formatRupiah(item.jumlah)}</span>
        <span style={{ fontFamily: FONT.mono, fontWeight: 700, fontSize: 15, color: lunas ? COLORS.green : COLORS.red }}>
          Sisa {formatRupiah(sisa)}
        </span>
      </div>
      <div style={{ height: 6, borderRadius: 4, background: COLORS.paperLine, overflow: "hidden", marginTop: 6 }}>
        <div style={{ width: `${pct}%`, height: "100%", background: lunas ? COLORS.green : COLORS.gold, borderRadius: 4 }} />
      </div>

      {!lunas && (
        <>
          {!showBayar ? (
            <button onClick={() => setShowBayar(true)} style={{ ...ghostBtnStyle, width: "100%", marginTop: 10 }}>
              Catat Pembayaran
            </button>
          ) : (
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <CurrencyInput
                value={nominal}
                onChange={setNominal}
                placeholder={`maks ${sisa}`}
                style={{ ...inputStyle, marginBottom: 0, flex: 1 }}
              />
              <button
                onClick={() => {
                  const n = Number(nominal);
                  if (n > 0) {
                    onBayar(item.id, Math.min(n, sisa));
                    setNominal("");
                    setShowBayar(false);
                  }
                }}
                style={primaryBtnStyle}
              >
                Simpan
              </button>
            </div>
          )}
        </>
      )}
      {lunas && <div style={{ fontSize: 12, color: COLORS.green, fontWeight: 700, marginTop: 8 }}>Lunas ✓</div>}
    </Card>
  );
}

function HutangForm({ tipe, onClose, onSubmit }) {
  const [nama, setNama] = useState("");
  const [jumlah, setJumlah] = useState("");
  const [tanggal, setTanggal] = useState(todayISO());
  const [catatan, setCatatan] = useState("");

  const submit = () => {
    if (!nama || !jumlah || Number(jumlah) <= 0) return;
    onSubmit({ tipe, nama, jumlah: Number(jumlah), tanggal, catatan });
  };

  return (
    <Modal onClose={onClose} title={tipe === "piutang" ? "Catat Piutang Baru" : "Catat Hutang Baru"}>
      <FieldLabel>{tipe === "piutang" ? "Dipinjamkan kepada" : "Meminjam dari"}</FieldLabel>
      <input type="text" placeholder="Nama orang" value={nama} onChange={(e) => setNama(e.target.value)} style={inputStyle} />

      <FieldLabel>Jumlah (Rp)</FieldLabel>
      <CurrencyInput value={jumlah} onChange={setJumlah} />

      <FieldLabel>Tanggal</FieldLabel>
      <input type="date" value={tanggal} onChange={(e) => setTanggal(e.target.value)} style={inputStyle} />

      <FieldLabel>Catatan (opsional)</FieldLabel>
      <input type="text" placeholder="mis. untuk biaya berobat" value={catatan} onChange={(e) => setCatatan(e.target.value)} style={inputStyle} />

      <button onClick={submit} style={{ ...primaryBtnStyle, width: "100%", justifyContent: "center", marginTop: 8 }}>
        Simpan
      </button>
    </Modal>
  );
}

        zIndex: 50,

          background: COLORS.paper,
          width: "100%",
          maxWidth: 480,

        </div>
        {children}

    </div>
  );
}
